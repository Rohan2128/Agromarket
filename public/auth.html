<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register | AgroMarket Amravati</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar scrolled">
    <div class="navbar-inner">
      <a class="navbar-brand" href="/"><div class="brand-icon">🌾</div>Agro<span>Market</span></a>
      <div class="nav-links">
        <a class="nav-link" href="/">🏠 Home</a>
        <a class="nav-link active" href="/auth">🔐 Login</a>
      </div>
    </div>
  </nav>

  <section class="auth-section" style="padding-top: 72px;">
    <div class="container">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-icon">🌾</div>
            <h2>Welcome to AgroMarket</h2>
            <p>Connect with farmers across Amravati</p>
          </div>
          <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" onclick="switchTab('register')">Register</button>
          </div>

          <!-- LOGIN -->
          <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>Email Address *</label>
              <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
              <label>Password *</label>
              <input type="password" id="loginPassword" placeholder="Enter your password" required minlength="6">
            </div>
            <div class="form-error" id="loginError"></div>
            <button type="submit" class="btn-auth" id="loginBtn">🔐 Login to AgroMarket</button>
            <p style="text-align:center; margin-top:16px; color: var(--text-muted); font-size:0.85rem;">
              🔒 Your data is protected with end-to-end encryption
            </p>
          </form>

          <!-- REGISTER -->
          <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="regName" placeholder="Enter your full name" required minlength="2">
            </div>
            <div class="form-group">
              <label>Email Address *</label>
              <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" id="regPhone" placeholder="10-digit phone number" required pattern="[6-9][0-9]{9}" title="Enter valid 10-digit phone number starting with 6-9">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Password *</label>
                <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
              </div>
              <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="regConfirmPassword" placeholder="Confirm password" required minlength="6">
              </div>
            </div>
            <div class="form-group">
              <label>I am a *</label>
              <select id="regRole" required>
                <option value="buyer">Buyer</option>
                <option value="farmer">Farmer / Seller</option>
                <option value="both">Both Buyer & Seller</option>
              </select>
            </div>
            <div class="form-group">
              <label>Location</label>
              <input type="text" id="regLocation" placeholder="e.g., Amravati City" value="Amravati">
            </div>
            <div class="form-error" id="registerError"></div>
            <button type="submit" class="btn-auth" id="regBtn">🌾 Create Account</button>
            <p style="text-align:center; margin-top:16px; color: var(--text-muted); font-size:0.85rem;">
              🔒 Your credentials are encrypted before transmission
            </p>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script>
    const API = '';
    const ENCRYPTION_KEY = 'agromarket_e2e_encryption_key_256bit!';

    function encrypt(data) {
      return CryptoJS.AES.encrypt(JSON.stringify(data), ENCRYPTION_KEY).toString();
    }

    function showToast(msg, type='info') {
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      const icons = {success:'✅',error:'❌',info:'ℹ️'};
      t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
      document.body.appendChild(t);
      t.style.cssText = 'position:fixed;top:90px;right:24px;z-index:9999;padding:14px 24px;border-radius:14px;background:#112215;border:1px solid rgba(76,175,80,0.2);color:#e8f5e9;box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:slideInRight 0.3s ease;';
      if(type==='success') t.style.borderLeft='4px solid #66bb6a';
      if(type==='error') t.style.borderLeft='4px solid #ef5350';
      setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},3000);
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t,i) => {
        t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
      });
      document.getElementById('loginForm').classList.toggle('hidden', tab!=='login');
      document.getElementById('registerForm').classList.toggle('hidden', tab!=='register');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      if (!email || !password) { errorEl.textContent='All fields are required'; errorEl.classList.add('show'); return; }

      btn.disabled = true; btn.textContent = '⏳ Logging in...';
      try {
        const encrypted = encrypt({ email, password });
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ _encrypted: encrypted })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('agromarket_token', data.token);
          localStorage.setItem('agromarket_user', JSON.stringify(data.user));
          showToast(data.message, 'success');
          setTimeout(() => window.location.href = '/', 1000);
        } else {
          errorEl.textContent = data.message; errorEl.classList.add('show');
          btn.disabled = false; btn.textContent = '🔐 Login to AgroMarket';
        }
      } catch (err) {
        errorEl.textContent = 'Server error. Please try again.'; errorEl.classList.add('show');
        btn.disabled = false; btn.textContent = '🔐 Login to AgroMarket';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirmPassword').value;
      const role = document.getElementById('regRole').value;
      const location = document.getElementById('regLocation').value.trim();
      const errorEl = document.getElementById('registerError');
      const btn = document.getElementById('regBtn');

      if (password !== confirm) { errorEl.textContent='Passwords do not match'; errorEl.classList.add('show'); return; }
      if (!/^[6-9]\d{9}$/.test(phone)) { errorEl.textContent='Enter valid 10-digit phone number'; errorEl.classList.add('show'); return; }

      btn.disabled = true; btn.textContent = '⏳ Creating account...';
      try {
        const encrypted = encrypt({ name, email, phone, password, role, location });
        const res = await fetch(API + '/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ _encrypted: encrypted })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('agromarket_token', data.token);
          localStorage.setItem('agromarket_user', JSON.stringify(data.user));
          showToast(data.message, 'success');
          setTimeout(() => window.location.href = '/', 1000);
        } else {
          errorEl.textContent = data.message; errorEl.classList.add('show');
          btn.disabled = false; btn.textContent = '🌾 Create Account';
        }
      } catch (err) {
        errorEl.textContent = 'Server error. Please try again.'; errorEl.classList.add('show');
        btn.disabled = false; btn.textContent = '🌾 Create Account';
      }
    }

    // Redirect if already logged in
    if (localStorage.getItem('agromarket_token')) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
